<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | DRP & Co. LLP</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#FAFBFD;color:#3d3d56;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
        .wrap{max-width:480px}
        .code{font-family:'DM Serif Display',serif;font-size:clamp(4rem,10vw,7rem);color:#1F3864;line-height:1;margin-bottom:.5rem}
        h1{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#1F3864;margin-bottom:.75rem}
        p{font-size:.95rem;line-height:1.7;color:#6b6b80;margin-bottom:2rem}
        a{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;background:#1F3864;color:#fff;border-radius:8px;font-size:.9rem;font-weight:600;text-decoration:none;transition:all .25s}
        a:hover{background:#2E5FA3;transform:translateY(-1px);box-shadow:0 4px 16px rgba(31,56,100,0.2)}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you are looking for may have been moved or does not exist. Please check the URL or return to the homepage.</p>
        <a href="/">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Homepage
        </a>
    </div>
</body>
</html>
